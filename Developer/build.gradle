apply plugin: 'java'
apply plugin: 'application'

application {
    mainClass = 'AppHandler'
}

version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.api-client:google-api-client:2.0.0'
    implementation 'com.google.oauth-client:google-oauth-client-jetty:1.34.1'
    implementation 'com.google.apis:google-api-services-gmail:v1-rev20220404-2.0.0'
    implementation 'com.google.cloud:google-cloud-secretmanager:2.85.0'
    implementation platform('com.google.cloud:libraries-bom:26.76.0')
    implementation 'com.google.cloud:google-cloud-storage'
}

tasks.withType(Jar) {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

jar {
    manifest {
        attributes 'Main-Class': 'AppHandler' // Replace with your main class
    }
    // This part collects all dependencies into the JAR for a "fat JAR"
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    exclude 'META-INF/*.RSA', 'META-INF/*.SF','META-INF/*.DSA'
}
